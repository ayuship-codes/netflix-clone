<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="head">
        <nav>
            <img width=70px src="assets/images/logo.svg">
            <div class="nav-btn">
                
                <select id="lang" name="lang" >
                    <option value="english">English</option>
                    <option value="hindi">Hindi</option>
                </select>
                <button class="red-btn sign-btn">Sign In</button>
            </div>
        </nav>
        <div class="hero">
            <span class="title">Unlimited movies, series and more</span>
            <span class="subtitle">Starts at Rs 149.Cancel anytime</span>
            <span class="desc">Ready to watch? Enter yout email to create or continue oyur membership</span>
            <div class="hero-btn">
                <input type="email" placeholder="Email Address">
                <button class="red-btn strt-btn">Get Started &gt</button>
            </div>
        </div>
    </div>

    <div class="separator"></div>

    <div class="content">
        <h3>Trending Now</h3>
        <div class="movie-row">
            <div class="card"><img src="assets/images/01.webp"></div>
            <div class="card"><img src="assets/images/02.webp"></div>
            <div class="card"><img src="assets/images/03.webp"></div>
            <div class="card"><img src="assets/images/04.webp"></div>
            <div class="card"><img src="assets/images/05.webp"></div>
            <div class="card"><img src="assets/images/06.webp"></div>
            <div class="card"><img src="assets/images/07.webp"></div>
        </div>
        <div class="info">
            <h3>More Reasons to join</h3>
            <div class="container">
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
            </div>
        </div>
    </div>   

    

    </div>

</body>

</html>
