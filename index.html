<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="head">
        <nav>
            <img width=60px src="assets/images/logo.svg">
            <div class="nav-btn">
                <label for="lang" name="lang">English</label>
                <select id="lang" name="lang">
                    <option value="english">English</option>
                    <option value="hindi">Hindi</option>
                </select>
                <button class="red-btn">Sign In</button>
            </div>
        </nav>
        <div class="hero">
            <span class="hero-txt">Unlimited movies, series and more</span>
            <div class="hero-btn">
                <input type="text" placeholder="Email Address">
                <button class="red-btn">Get Started</button>
            </div>
        </div>
    </div>


</body>

</html>
